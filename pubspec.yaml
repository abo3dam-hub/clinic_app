name: clinic_app
description: نظام إدارة عيادة طبية - Flutter Desktop
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0

  # State Management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.2.0

  # Fonts & UI
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.0

  # PDF Export
  pdf: ^3.10.8
  printing: ^5.13.1

  # Excel Export
  excel: ^4.0.3

  # File Picker (backup/restore, export)
  file_picker: ^11.0.2

  # Formatting
  intl: ^0.20.2

  # Icons
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
