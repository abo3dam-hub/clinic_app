name: Windows Build

on:
  push:
    branches:
      - main # أو master حسب اسم الفرع الأساسي عندك

jobs:
  build:
    name: Build Flutter Windows
    runs-on: windows-latest

  

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

    
        
      - name: Clean Project
        run: flutter clean

      # خطوة جديدة: حذف ملف pubspec.lock لتجنب تعارض إصدارات المكاتب
      - name: Delete pubspec.lock
        run: if (Test-Path pubspec.lock) { Remove-Item -Force pubspec.lock }
        shell: powershell

      - name: Install Dependencies
        run: flutter pub get
      - name: Copy Windows App Icon
        run: |
          if (!(Test-Path "windows/runner/resources")) {
          New-Item -ItemType Directory -Path "windows/runner/resources" -Force
            }
              Copy-Item "assets/images/logo.ico" "windows/runner/resources/app_icon.ico" -Force
        shell: powershell
      # التعديل هنا: إضافة -v لطباعة تفاصيل الخطأ الحقيقي في حال وجوده
      - name: Build Windows App (Verbose)
        run: flutter build windows --release -v

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app-release
          path: build/windows/x64/runner/Release/
          
